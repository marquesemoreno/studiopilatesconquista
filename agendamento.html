<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agendamento — Studio Pilates Conquista</title>
<meta name="description" content="Agende Pilates, Fisioterapia, RPG ou Estética no Studio Pilates Conquista." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Fraunces', 'serif'],
          body: ['Poppins', 'sans-serif'],
        },
        colors: {
          brand: {
            teal: '#016186',
            'teal-dark': '#01405c',
            'teal-light': '#e6f3f6',
            sand: '#f6f1e9',
            'sand-dark': '#ece3d3',
            ink: '#243037',
            muted: '#5a6f7c',
          }
        }
      }
    }
  }
</script>
<style>
  html { scroll-behavior: smooth; }
  body { font-family: 'Poppins', sans-serif; color: #243037; }
  .font-display { font-family: 'Fraunces', serif; }
  .hero-mesh {
    background-image:
      radial-gradient(at 30% 20%, rgba(1,97,134,0.45) 0px, transparent 50%),
      radial-gradient(at 75% 70%, rgba(1,97,134,0.35) 0px, transparent 55%),
      radial-gradient(at 25% 75%, rgba(236,227,211,0.85) 0px, transparent 45%);
    filter: blur(36px);
  }
  @media (max-width: 640px) {
    .hero-mesh { filter: blur(24px); }
  }
</style>
</head>
<body class="antialiased">

<!-- Navbar -->
<header class="sticky top-0 z-50 bg-sand/80 backdrop-blur border-b border-brand-sand-dark/60">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
\n
<!-- Hero -->
<section class="relative overflow-hidden">
  <div class="absolute inset-0 hero-mesh"></div>
  <div class="relative min-h-[60vh]">
    <div class="absolute inset-0">
      <img src="/images/hero.webp" alt="Fachada Studio Pilates Conquista" class="w-full h-full object-cover" />
      <div class="absolute inset-0 bg-black/60"></div>
    </div>
    <div class="relative z-10 flex flex-col items-center justify-center text-center px-6 py-24 md:py-28">
      <h1 class="font-display text-4xl md:text-5xl lg:text-6xl text-white mb-4">Agendamento</h1>
      <p class="text-white/90 text-lg md:text-xl max-w-2xl">Escolha o serviço, envie sua preferência e a equipe confirma pelo WhatsApp.</p>
    </div>
  </div>
</section>

<!-- Form -->
<section class="max-w-7xl mx-auto px-6 py-20">
  <div class="max-w-3xl mx-auto bg-white rounded-3xl border border-brand-sand-dark shadow-sm p-8 md:p-10">
    <form id="bookingForm" class="space-y-6" onsubmit="event.preventDefault(); submitBooking();">
      <div>
        <label class="block text-sm font-medium text-brand-ink mb-2">Serviço</label>
        <select id="service" class="w-full rounded-2xl border border-brand-sand-dark bg-sand/40 px-4 py-3 text-brand-ink focus:outline-none focus:ring-2 focus:ring-brand-teal">
          <option value="Pilates">Pilates</option>
          <option value="Fisioterapia">Fisioterapia</option>
          <option value="RPG">RPG</option>
          <option value="Estética">Estética</option>
          <option value="Fisioterapia Pediátrica">Fisioterapia Pediátrica</option>
          <option value="Fisioterapia Pélvica">Fisioterapia Pélvica</option>
        </select>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-brand-ink mb-2">Turno preferido</label>
          <select id="shift" class="w-full rounded-2xl border border-brand-sand-dark bg-sand/40 px-4 py-3 text-brand-ink focus:outline-none focus:ring-2 focus:ring-brand-teal">
            <option value="Manhã">Manhã</option>
            <option value="Tarde">Tarde</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-brand-ink mb-2">Data preferida</label>
          <input type="date" id="date" class="w-full rounded-2xl border border-brand-sand-dark bg-sand/40 px-4 py-3 text-brand-ink focus:outline-none focus:ring-2 focus:ring-brand-teal" />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-brand-ink mb-2">Seu nome</label>
        <input type="text" id="name" placeholder="Ex: Lucas" class="w-full rounded-2xl border border-brand-sand-dark bg-sand/40 px-4 py-3 text-brand-ink placeholder:text-brand-muted focus:outline-none focus:ring-2 focus:ring-brand-teal" />
      </div>
      <div>
        <label class="block text-sm font-medium text-brand-ink mb-2">WhatsApp</label>
        <input type="tel" id="phone" placeholder="Ex: 77999999999" class="w-full rounded-2xl border border-brand-sand-dark bg-sand/40 px-4 py-3 text-brand-ink placeholder:text-brand-muted focus:outline-none focus:ring-2 focus:ring-brand-teal" />
      </div>
      <button type="submit" class="w-full inline-flex items-center justify-center gap-2 bg-brand-teal text-white px-6 py-3.5 rounded-full font-semibold shadow-sm hover:bg-brand-teal-dark transition">
        Enviar pedido de agendamento
      </button>
      <p class="text-brand-muted text-sm text-center">Você será redirecionado para o WhatsApp do Studio para confirmar.</p>
    </form>
  </div>
</section>

<!-- Footer -->
<footer class="bg-brand-sand-dark/60 border-t border-brand-sand-dark">
  <div class="max-w-7xl mx-auto px-6 py-10 flex flex-col md:flex-row items-center justify-between gap-6">
    <img src="/images/logo.jpg" alt="Studio Pilates" class="h-16 md:h-20 w-auto" />
    <div class="text-brand-muted text-sm">Av. Otávio Santos, 715 - Recreio, Vitória da Conquista - BA</div>
    <div class="flex items-center gap-5">
      <a href="https://www.instagram.com/studiopilatesconquista/" target="_blank" rel="noopener" class="inline-flex items-center gap-2 bg-brand-teal text-white px-5 py-2.5 rounded-full font-medium hover:bg-brand-teal-dark transition">Instagram</a>
      <a href="https://wa.me/557734252109" target="_blank" rel="noopener" class="inline-flex items-center gap-2 bg-brand-teal text-white px-5 py-2.5 rounded-full font-medium hover:bg-brand-teal-dark transition">WhatsApp</a>
    </div>
  <p class="text-brand-muted text-xs">© <span id="year"></span> Studio Pilates Conquista. Todos os direitos reservados.</p>
  </div>
</footer>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const mobileMenu = document.getElementById('mobileMenu');
  const yearSpan = document.getElementById('year');
  if (yearSpan) yearSpan.textContent = new Date().getFullYear();

  function closeMenu() {
    if (!mobileMenu || !menuToggle) return;
    mobileMenu.classList.add('hidden');
    menuToggle.setAttribute('aria-expanded', 'false');
  }

  if (menuToggle && mobileMenu) {
    menuToggle.addEventListener('click', () => {
      const isHidden = mobileMenu.classList.contains('hidden');
      mobileMenu.classList.toggle('hidden', !isHidden);
      menuToggle.setAttribute('aria-expanded', String(isHidden));
    });

    mobileMenu.querySelectorAll('a').forEach((link) => {
      link.addEventListener('click', () => {
        closeMenu();
      });
    });
  }

  const path = location.pathname.replace(/\/$/, '');
  const bookingNavLink = document.querySelector('a[href="/agendamento"]');
  const bookingForm = document.getElementById('bookingForm');
  if (path === '/agendamento' || path === '/agendamento.html') {
    closeMenu();
    if (bookingNavLink) bookingNavLink.setAttribute('aria-current', 'page');
  }

  function submitBooking() {
    const service = document.getElementById('service').value;
    const shift = document.getElementById('shift').value;
    const date = document.getElementById('date').value;
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!name || !phone) {
      alert('Preencha nome e WhatsApp para enviar o pedido.');
      return;
    }

    const text = encodeURIComponent(`Olá! Gostaria de agendar: ${service}, ${shift}, ${date}. Nome: ${name} | WhatsApp: ${phone}`);
    window.open('https://wa.me/557734252109?text=' + text, '_blank');
  }

  if (bookingForm) bookingForm.addEventListener('submit', submitBooking);
</script>
</body>
</html>
